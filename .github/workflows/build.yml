name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller build.spec

      - name: Compute SHA256
        run: |
          $exe = "dist\ed_navigator.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash
          "$exe  $hash" | Out-File -FilePath "dist\ed_navigator.exe.sha256.txt" -Encoding utf8
        shell: pwsh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ed_navigator.exe
            dist/ed_navigator.exe.sha256.txt
