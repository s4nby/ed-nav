name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller build.spec

      - name: Compute SHA256
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $exe = "dist\ed_navigator_v$version.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash
          "$exe  $hash" | Out-File -FilePath "dist\ed_navigator_v$version.exe.sha256.txt" -Encoding utf8
        shell: pwsh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ed_navigator_v*.exe
            dist/ed_navigator_v*.exe.sha256.txt
